<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!--
    ChatClaw lobster logo
    - Uses only currentColor so it can be tinted (red for brand, grayscale in monochrome places)
    - Simplified but balanced shape to work at small sizes (floating ball, avatars, etc.)
  -->
  <g fill="currentColor">
    <!-- Body -->
    <ellipse cx="256" cy="220" rx="70" ry="90" />

    <!-- Segmented tail -->
    <path d="M214 294c-9 0-16 7-16 16v12c0 38 24 70 58 70s58-32 58-70v-12c0-9-7-16-16-16H214z" />
    <rect x="224" y="304" width="64" height="20" rx="8" />
    <rect x="228" y="332" width="56" height="20" rx="8" />
    <rect x="232" y="360" width="48" height="20" rx="8" />

    <!-- Legs -->
    <path d="M212 252c-12 0-26 3-40 10-16 8-28 18-37 30-4 5-3 13 2 17s13 3 17-2c15-19 34-26 57-26h1c7 0 12-6 12-13s-6-13-12-13z" />
    <path d="M300 252c12 0 26 3 40 10 16 8 28 18 37 30 4 5 3 13-2 17s-13 3-17-2c-15-19-34-26-57-26h-1c-7 0-12-6-12-13s6-13 12-13z" />

    <!-- Left claw arm -->
    <path d="M212 210c-26-18-46-40-60-66-10-18-26-30-46-36-7-2-15 2-17 10-3 7 2 15 9 18 12 4 21 11 27 21-23-3-44 2-61 15-6 5-7 14-2 20 5 6 14 7 20 2 18-14 47-14 76-3 16 6 31 13 44 23 6 4 15 3 19-3 5-7 3-15-3-20z" />

    <!-- Right claw arm -->
    <path d="M300 210c26-18 46-40 60-66 10-18 26-30 46-36 7-2 15 2 17 10 3 7-2 15-9 18-12 4-21 11-27 21 23-3 44 2 61 15 6 5 7 14 2 20-5 6-14 7-20 2-18-14-47-14-76-3-16 6-31 13-44 23-6 4-15 3-19-3-5-7-3-15 3-20z" />

    <!-- Left pincer -->
    <path d="M96 118c-11 0-20 9-20 20 0 16 8 32 22 45 5 5 13 5 19 0 5-5 5-13 0-18-7-6-11-14-11-22 0-11-9-20-20-20z" />
    <!-- Right pincer -->
    <path d="M416 118c11 0 20 9 20 20 0 16-8 32-22 45-5 5-13 5-19 0-5-5-5-13 0-18 7-6 11-14 11-22 0-11 9-20 20-20z" />

    <!-- Antennas -->
    <path d="M238 118c0-26-5-52-16-76-3-7-11-10-18-7-7 3-10 11-7 18 10 21 15 41 15 65 0 7 6 13 13 13s13-6 13-13z" />
    <path d="M274 118c0-26 5-52 16-76 3-7 11-10 18-7 7 3 10 11 7 18-10 21-15 41-15 65 0 7-6 13-13 13s-13-6-13-13z" />

    <!-- Head -->
    <ellipse cx="256" cy="150" rx="56" ry="52" />

    <!-- Eyes -->
    <circle cx="232" cy="140" r="8" fill="#ffffff" />
    <circle cx="280" cy="140" r="8" fill="#ffffff" />
    <circle cx="232" cy="140" r="4" />
    <circle cx="280" cy="140" r="4" />

    <!-- Mouth -->
    <path d="M232 168c6 8 14 12 24 12s18-4 24-12" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
