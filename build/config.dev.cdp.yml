# This file contains the configuration for E2E testing with WebView2 CDP.
# Usage: wails3 dev -config build/config.dev.cdp.yml
version: '3'

info:
  companyName: "sesame"
  productName: "ChatClaw"
  productIdentifier: "com.sesame.chatclaw"
  description: "ChatClaw"
  copyright: "Copyright © 2016- 2026 Sesame Small Customer Service Network Technology Co., Ltd."
  comments: "ChatClaw"
  version: "0.9.7"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: "wails3 build DEV=true"
      type: blocking
      env:
        WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--remote-debugging-port=9222"
    - cmd: "wails3 task common:dev:frontend"
      type: background
      env:
        WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--remote-debugging-port=9222"
    - cmd: "wails3 task run"
      type: primary
      env:
        WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--remote-debugging-port=9222"

fileAssociations: []
other: []
